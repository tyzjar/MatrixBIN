direction {
  left=0
  right=1
#  right=2  
}
left_speed {
  first=0
  second=1
}
right_speed {
  first=0
  second=1
#  first=2
#  second=3
}
left_type {
  first=0
  second=1
}
right_type {
  first=0
  second=1
#  first=2
#  second=3
}


static_parameters {
  minimum=20
  capacity={15000,30000}
  step={5,10}
  unit="кг"
#0 - multi_interval, 1 - multi_range  
  range_mode=0
  underloading=5
  overloading=9
#nomotion_time
  nomotion_time=1000
#nomotion_range
  nomotion_range=1
}

dynamic_parameters {
  capacity={100000,200000}
#  capacity={200000}
  minimum=0
  step={50,100}
#  step=50
  unit="кг"
  scale_type="Vagon_Scale"
  timeout=6
# вес на платформе для начала процесса взвешивания
  zero_treshold=200
  stabilization_time=250
  min_speed=2
  max_speed=5
  minpulse_duration=75
# для обсчета весовых данных  
  derivative_range=100
  initial_group_duration=100
  lr_loco_push {
    tilt=1.000000
    shift=0
  }
  rl_loco_push {
    tilt=1.000000
    shift=0
  }
  lr_loco_pull {
    tilt=1.002
    shift=0
  }
  rl_loco_pull {
    tilt=1.0007
    shift=40
  }
  loco_pos {
  	lr = pull
  	rl = push
  }
  enable_edit_results_type_car=true
  false_raise {
  	distance = 1.7
  	default_speed = 5
  	ratio = 0.6
  }
}

setting_parameters {
	flag_direct=true
	flag_position_loco=true	
}

car_types {
	4Axle_LR={"0,0,1,1"}
#	4Axle_RL={"2,2,3,3"}      
	4Axle_RL="0,0,1,1"
	6Axle_LR={"0,0,1,0,1,1"}
	6Axle_RL={"0,0,1,0,1,1"}
#	6Axle_RL={"2,2,3,2,3,3"}
#	6Axle_RL="6,6,7,6,7,7" 
	loco_8Axle_LR={"0,0,1,0,1,0"}
#	loco_8Axle_RL={"2,2,3,2,3,2"}
#	loco_8Axle_RL="6,6,7,6,7,6"
	loco_8Axle_RL={"0,0,1,0,1,0"}
}

results {
	loco_in_protocol=true
	path_protocol_to_save="/var/log/matrix/protocol_to_save"
}

scaled {
	host="0.0.0.0"
	port=5001
}

info {
	name_soft="Библиотека для взвешивания в движении и статике"
	id_soft="Matrix_lib"
	version_soft="2.0.2.1"
# номер калибровки для каждой весовой системы	
	number_calibration={27,34,1,1}
}

mqtt {
     id="mqtt_matrix"
     host="localhost"
     port=1883
     user="matrix"
     password="1234"
}
