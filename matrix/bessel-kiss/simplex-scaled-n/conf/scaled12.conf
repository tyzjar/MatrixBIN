# Hash = ""
Listen_port = 5000
Command_port = 5001

serial {
  dev = "/dev/ttyS2"
  baud = "115200"
  data = "8"
  stop = "1"
  flow = "off"
  parity = "none"

  id = 0
  device {
    addr = 0
    model = "ldu781"
	datatype = "weight"
  }
}

serial {
  dev = "/dev/ttyS3"
  baud = "115200"
  data = "8"
  stop = "1"
  flow = "off"
  parity = "none"

  id = 1
  device {
    addr = 0
    model = "ldu781"
	datatype = "raw"
  }
}

#SZ, ST, RT
command {
  cmd ldu681 {
	set_zero = "SZ\r"
	set_tare = "ST\r"
	reset_tare = "RT\r"
  }
  cmd ldu781 {
#	set_zero = "SZ\r"
	set_tare = "ST\r"
	reset_tare = "RT\r"
  }
}

#W+00100+011005109'\r'
Length = 18

Weight {
	Position = 2
	Length = 6
}

Status {
	Position = 0
	Length = 2
	Stable = "ST"
	Unstable = "US"
	OverLoad = "OL"
	UnderLoad = ""
}

Gross {
	Position = 7
	Length = 6
	Net = "NT"
	Gross = "GS"
}

Unit {
	Position = 14
	Length = 2
	Kg = "kg"
	g = " g"
}

